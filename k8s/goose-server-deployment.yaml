apiVersion: apps/v1
kind: Deployment
metadata:
  name: goose-server
  namespace: goose-system
  labels:
    app: goose-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: goose-server
  template:
    metadata:
      labels:
        app: goose-server
    spec:
      containers:
      - name: goose-server
        image: goose-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8765
        env:
        - name: PYTHONPATH
          value: "/app"
        workingDir: /app
        command: ["python", "-m", "src.services.goose_server"]
---
apiVersion: v1
kind: Service
metadata:
  name: goose-server-service
  namespace: goose-system
spec:
  selector:
    app: goose-server
  ports:
  - port: 8765
    targetPort: 8765
  type: ClusterIP