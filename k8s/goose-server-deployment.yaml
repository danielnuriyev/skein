apiVersion: apps/v1
kind: Deployment
metadata:
  name: goose-server
  namespace: goose-system
  labels:
    app: goose-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: goose-server
  template:
    metadata:
      labels:
        app: goose-server
    spec:
      containers:
      - name: goose-server
        image: python:3.12-slim
        ports:
        - containerPort: 8765
        env:
        - name: PYTHONPATH
          value: "/app/src"
        workingDir: /app
        command: ["python", "-m", "src.goose_server"]
        volumeMounts:
        - name: goose-src
          mountPath: /app/src
          readOnly: true
        - name: goose-config
          mountPath: /app/config
          readOnly: true
        - name: goose-prompts
          mountPath: /app/prompts
          readOnly: true
        - name: goose-logs
          mountPath: /app/.logs
      volumes:
      - name: goose-src
        configMap:
          name: goose-src
      - name: goose-config
        configMap:
          name: goose-config-files
      - name: goose-prompts
        configMap:
          name: goose-prompts
      - name: goose-logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: goose-server-service
  namespace: goose-system
spec:
  selector:
    app: goose-server
  ports:
  - port: 8765
    targetPort: 8765
  type: ClusterIP