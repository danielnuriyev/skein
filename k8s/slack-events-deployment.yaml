apiVersion: apps/v1
kind: Deployment
metadata:
  name: slack-events
  namespace: goose-system
  labels:
    app: slack-events
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slack-events
  template:
    metadata:
      labels:
        app: slack-events
    spec:
      containers:
      - name: slack-events
        image: python:3.12-slim
        ports:
        - containerPort: 3001
        env:
        - name: PYTHONPATH
          value: "/app/src"
        - name: PORT
          value: "3001"
        - name: GOOSE_SERVER_URL
          valueFrom:
            configMapKeyRef:
              name: goose-config
              key: GOOSE_SERVER_URL
        - name: SLACK_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: goose-secrets
              key: SLACK_SIGNING_SECRET
        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: goose-secrets
              key: SLACK_BOT_TOKEN
        workingDir: /app
        command: ["python", "-m", "src.slack_events"]
        volumeMounts:
        - name: slack-events-src
          mountPath: /app/src
          readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: slack-events-service
  namespace: goose-system
spec:
  selector:
    app: slack-events
  ports:
  - port: 3001
    targetPort: 3001
  type: LoadBalancer  # Expose externally for Slack webhooks