apiVersion: apps/v1
kind: Deployment
metadata:
  name: slack-server
  namespace: goose-system
  labels:
    app: slack-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slack-server
  template:
    metadata:
      labels:
        app: slack-server
    spec:
      containers:
      - name: slack-server
        image: goose-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: PYTHONPATH
          value: "/app/src"
        - name: PORT
          value: "3000"
        - name: GOOSE_SERVER_URL
          valueFrom:
            configMapKeyRef:
              name: goose-config
              key: GOOSE_SERVER_URL
        - name: SLACK_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: goose-secrets
              key: SLACK_SIGNING_SECRET
        workingDir: /app
        command: ["python", "-m", "src.slack_server"]
---
apiVersion: v1
kind: Service
metadata:
  name: slack-server-service
  namespace: goose-system
spec:
  selector:
    app: slack-server
  ports:
  - port: 3000
    targetPort: 3000
  type: LoadBalancer  # Expose externally for Slack webhooks