apiVersion: v1
kind: ConfigMap
metadata:
  name: goose-config
  namespace: goose-system
data:
  # Goose configuration
  GOOSE_PROVIDER: "litellm"
  GOOSE_MODEL: "bedrock-claude-opus-4-6"
  LITELLM_HOST: "http://litellm-service:4321"
  LITELLM_BASE_PATH: "v1/chat/completions"

  # Service URLs (internal Kubernetes DNS)
  GOOSE_SERVER_URL: "http://goose-server-service:8765"
  DAGSTER_GRAPHQL_URL: "http://dagster-webserver.dagster.svc.cluster.local:3000/graphql"

  # Ports
  LITELLM_PORT: "4321"
  GOOSE_SERVER_PORT: "8765"
  SLACK_SERVER_PORT: "3000"
  SLACK_EVENTS_PORT: "3001"
  GITHUB_REVIEWER_PORT: "4000"